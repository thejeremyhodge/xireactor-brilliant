# ============================================================
# xiReactor Brilliant — Render Blueprint
# ============================================================
# One-click deploy for non-technical operators. Provisions:
#   - brilliant-api  (FastAPI, Docker)           — Starter plan
#   - brilliant-mcp  (MCP remote server, Docker) — Starter plan
#   - brilliant-db   (Managed Postgres)          — Basic-256mb
#   - 1 GB disk attached to api at /data (attachment blobs)
#
# Spec:   .xireactor/specs/0037b--2026-04-18--render-first-deploy-adapter.md
# README: "Deploy to Render" section — recovery flow + Starter tier rationale
#
# Deploy-time input: ADMIN_EMAIL is the only required user-provided value.
# After provision, the admin visits `/setup`, chooses a password, and the
# server generates the API key + displays the MCP URL on `/setup/done`.
# (ADMIN_PASSWORD / ADMIN_API_KEY are NOT env vars on the Render path —
#  they are captured POST-deploy by the /setup flow.)
#
# fromService wiring: `property: host` returns Render's INTERNAL service-
# discovery name (e.g. "brilliant-mcp") — NOT the public FQDN. Render does
# not expose a full-URL property via fromService. For the API service to
# display the MCP's public URL on /setup/done and /auth/login, the MCP
# service writes its own $RENDER_EXTERNAL_URL into brilliant_settings.mcp_public_url
# at boot (see mcp/remote_server.py::_publish_public_url_to_db and migration
# 029). The BRILLIANT_MCP_PUBLIC_URL env below is kept only as a fallback
# for local dev / explicit override.
# ============================================================

databases:
  - name: brilliant-db
    plan: basic-256mb
    databaseName: brilliant
    # user omitted — Render auto-generates the DB user; `postgres` is reserved
    # and rejected by Blueprint validation. DATABASE_URL still resolves via
    # `fromDatabase.property: connectionString` below.

services:
  # ----------------------------------------------------------
  # API — FastAPI app, Dockerfile at ./api/Dockerfile
  # ----------------------------------------------------------
  - type: web
    name: brilliant-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    # Override the Dockerfile CMD to drop `--reload` in production.
    # Render's Docker runtime uses `dockerCommand` (not `startCommand`,
    # which is native-runtime only).
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    # Runs before every deploy (Render executes this inside the built
    # image against the live DB). Idempotent migrations 001..027.
    preDeployCommand: python tools/render_migrate.py
    disk:
      name: brilliant-data
      mountPath: /data
      sizeGB: 1
    envVars:
      # --- Database ---
      - key: DATABASE_URL
        fromDatabase:
          name: brilliant-db
          property: connectionString

      # --- Admin bootstrap (Render path) ---
      # Only ADMIN_EMAIL is captured at deploy time; password + API key
      # are set POST-deploy via /setup. See api/admin_bootstrap.py.
      - key: ADMIN_EMAIL
        sync: false

      # --- Storage (local disk at /data) ---
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_STORAGE_ROOT
        value: /data/uploads

      # --- MCP public URL fallback ---
      # Authoritative MCP URL is written into brilliant_settings.mcp_public_url
      # by the MCP service at boot (from its own $RENDER_EXTERNAL_URL). This
      # env var is only read by the API as a fallback when that DB column is
      # NULL — e.g. before the MCP service has completed its first boot, or
      # on local dev where RENDER_EXTERNAL_URL is unset. fromService here
      # yields the internal service name only (useful as a tag, not a URL).
      - key: BRILLIANT_MCP_PUBLIC_URL
        fromService:
          type: web
          name: brilliant-mcp
          property: host

      # --- OAuth user-binding handoff (sprint 0039) ---
      # HMAC-SHA256 secret shared between the API and the MCP. The API
      # signs `{tx_id}|{user_id}` after a successful /oauth/login POST
      # and redirects to `{MCP}/oauth/continue?...&sig=...`; the MCP
      # verifies the sig before minting an auth code. `generateValue: true`
      # lets Render emit a fresh random value on first deploy and keep it
      # stable across restarts — never sync: false so the operator can't
      # accidentally leave it blank. The same secret is plumbed into the
      # MCP service below via `fromService.envVarKey`.
      - key: OAUTH_HANDOFF_SECRET
        generateValue: true

      # --- Service-role API key (sprint 0039) ---
      # Plaintext shared secret that the MCP presents as its outbound
      # `Authorization: Bearer`. Per-user identity is carried via
      # `X-Act-As-User` (honored only when the presenting key is
      # `key_type='service'` — see api/auth.py + migration 031).
      # `generateValue: true` + fromService sharing keeps api + mcp in
      # sync; the value is also logged by admin_bootstrap so an operator
      # can rotate via `/auth/login` if it leaks.
      - key: BRILLIANT_SERVICE_API_KEY
        generateValue: true

      # --- Optional Tier 3 AI reviewer ---
      - key: ANTHROPIC_API_KEY
        sync: false

  # ----------------------------------------------------------
  # MCP — remote MCP server, Dockerfile at ./mcp/Dockerfile
  # ----------------------------------------------------------
  - type: web
    name: brilliant-mcp
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./mcp/Dockerfile
    dockerContext: ./mcp
    # Dockerfile CMD `python remote_server.py` is fine for production.
    envVars:
      # --- Database (for OAuth store + session logs) ---
      - key: DATABASE_URL
        fromDatabase:
          name: brilliant-db
          property: connectionString

      # --- API base URL (internal-to-Render service-discovery name) ---
      # Render returns the internal service name (e.g. "brilliant-api") here,
      # NOT the public FQDN. mcp/client.py prepends `https://` when building
      # the outbound URL — internal-network resolution on Render maps the
      # bare name to the service. If you ever need a public URL here, the
      # same RENDER_EXTERNAL_URL + DB-publish pattern used for the MCP URL
      # (migration 029) is the way.
      - key: BRILLIANT_BASE_URL
        fromService:
          type: web
          name: brilliant-api
          property: host

      # --- MCP self-URL ---
      # MCP_PORT must match what Render binds; remote_server.py reads
      # MCP_BASE_URL from its own $RENDER_EXTERNAL_URL at boot if unset.
      # We still export MCP_BASE_URL using the self-hostname for clarity.
      - key: MCP_PORT
        value: "8001"
      - key: MCP_BASE_URL
        fromService:
          type: web
          name: brilliant-mcp
          property: host

      - key: TOKEN_EXPIRY_SECONDS
        value: "3600"

      # --- OAuth user-binding handoff (sprint 0039) ---
      # Shared HMAC secret — API generates on first deploy, MCP reads
      # back via Render's fromService.envVarKey. The MCP uses this to
      # verify `/oauth/continue?sig=...` signatures written by the API's
      # /oauth/login POST handler before it mints an auth code.
      - key: OAUTH_HANDOFF_SECRET
        fromService:
          type: web
          name: brilliant-api
          envVarKey: OAUTH_HANDOFF_SECRET

      # --- Service-role API key (sprint 0039) ---
      # The MCP's outbound Authorization: Bearer when calling the API.
      # Minted by the API service (generateValue), pulled here via
      # fromService. `mcp/client.py` reads this env var and combines it
      # with per-request `X-Act-As-User` headers derived from the
      # AccessToken.user_id bound on each OAuth token.
      - key: BRILLIANT_SERVICE_API_KEY
        fromService:
          type: web
          name: brilliant-api
          envVarKey: BRILLIANT_SERVICE_API_KEY
